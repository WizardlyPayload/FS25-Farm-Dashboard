<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Manager - FS25 Farm Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #313244; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 850px; display: flex; gap: 30px; }
        .left-panel { flex: 1; border-right: 2px solid #45475a; padding-right: 20px; }
        .right-panel { flex: 1.5; }
        h2, h3 { margin-top: 0; color: #89b4fa; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #a6adc8; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #45475a; border-radius: 6px; background-color: #1e1e2e; color: #cdd6f4; box-sizing: border-box; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #45475a; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #cdd6f4; }
        button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background-color: #89b4fa; color: #11111b; width: 100%; margin-top: 10px; }
        .btn-add:hover { background-color: #b4befe; }
        .btn-launch { background-color: #a6e3a1; color: #11111b; width: 100%; font-size: 16px; padding: 15px; margin-top: 20px; }
        .btn-launch:hover { background-color: #94e289; }
        .btn-delete { background-color: #f38ba8; color: #11111b; padding: 5px 10px; font-size: 12px; }
        .btn-magic { background: linear-gradient(135deg, #a6e3a1 0%, #89b4fa 100%); color: #11111b; width: 100%; margin-bottom: 25px; font-size: 15px; box-shadow: 0 4px 15px rgba(137,180,250,0.3); }
        .btn-magic:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(137,180,250,0.5); }
        #ftp-settings { display: none; }
        .hint { font-size: 11px; color: #7f849c; margin-top: 4px; }
        .server-item { background-color: #1e1e2e; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #45475a; }
        .server-item .info strong { display: block; color: #a6e3a1; font-size: 15px; }
        .server-item .info span { font-size: 12px; color: #a6adc8; }
        #empty-servers { text-align: center; color: #7f849c; font-size: 13px; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h2>Your Servers</h2>
        <div id="server-list"></div>
        <div id="empty-servers">No servers added yet.</div>
        <button class="btn-launch" onclick="saveAndLaunch()">Launch Dashboard</button>
    </div>

    <div class="right-panel">
        <button class="btn-magic" onclick="autoDetectSaves()">✨ Auto-Detect Local Saves</button>
        
        <h3 style="border-top: 1px solid #45475a; padding-top: 20px;">Or Add Manually</h3>
        
        <div class="form-group">
            <label>Server Display Name</label>
            <input type="text" id="serverName" placeholder="e.g., Dedicated GPortal">
        </div>

        <div class="radio-group">
            <label><input type="radio" name="mode" value="local" checked onchange="toggleMode()"> Local PC</label>
            <label><input type="radio" name="mode" value="ftp" onchange="toggleMode()"> FTP (Dedicated)</label>
        </div>

        <div id="local-settings">
            <div class="form-group">
                <label>Base modSettings Path</label>
                <input type="text" id="localPath" placeholder="C:\Users\...\modSettings\FS25_FarmDashboard">
            </div>
            <div class="form-group">
                <label>Savegame Folder Name (Advanced)</label>
                <input type="text" id="localSubFolder" placeholder="e.g., savegame1">
                <div class="hint">Leave blank to use the Display Name as the folder name.</div>
            </div>
        </div>

        <div id="ftp-settings">
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 3;">
                    <label>FTP IP / Host</label>
                    <input type="text" id="ftpHost" placeholder="e.g., ftp.gportal.com">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Port</label>
                    <input type="number" id="ftpPort" value="21">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Username</label>
                    <input type="text" id="ftpUser">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Password</label>
                    <input type="password" id="ftpPass">
                </div>
            </div>
            <div class="form-group">
                <label>Base Profile Path</label>
                <input type="text" id="ftpBasePath" value="profile">
            </div>
        </div>

        <button class="btn-add" onclick="addServer()">+ Add Manually</button>
    </div>
</div>

<script>
    const { ipcRenderer } = require('electron');
    let servers = [];

    function toggleMode() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        document.getElementById('local-settings').style.display = mode === 'local' ? 'block' : 'none';
        document.getElementById('ftp-settings').style.display = mode === 'ftp' ? 'block' : 'none';
    }

    function renderServers() {
        const list = document.getElementById('server-list');
        list.innerHTML = '';
        document.getElementById('empty-servers').style.display = servers.length === 0 ? 'block' : 'none';

        servers.forEach((srv, index) => {
            const item = document.createElement('div');
            item.className = 'server-item';
            
            let pathInfo = srv.mode === 'local' 
                ? `Local: ${srv.localSubFolder || srv.name.replace(/[<>:"/\\|?*]/g, '').trim()}` 
                : `FTP: ${srv.ftpHost}`;
            
            item.innerHTML = `
                <div class="info">
                    <strong>${srv.name}</strong>
                    <span>${pathInfo}</span>
                </div>
                <button class="btn-delete" onclick="removeServer(${index})">Remove</button>
            `;
            list.appendChild(item);
        });
    }

    // --- THE NEW AUTO-DETECT MAGIC FUNCTION ---
    async function autoDetectSaves() {
        const btn = document.querySelector('.btn-magic');
        btn.textContent = "Scanning...";
        btn.disabled = true;

        try {
            const foundSaves = await ipcRenderer.invoke('scan-local-saves');
            
            if (foundSaves.length === 0) {
                alert("No existing saves found. Please make sure you have loaded a game with the mod enabled and saved at least once!");
            } else {
                // Filter out saves that are already in the list based on localSubFolder
                const newSaves = foundSaves.filter(found => 
                    !servers.some(existing => existing.localSubFolder === found.localSubFolder)
                );

                if (newSaves.length > 0) {
                    servers = [...servers, ...newSaves];
                    renderServers();
                    alert(`Successfully imported ${newSaves.length} saves!`);
                } else {
                    alert("All detected saves are already in your list!");
                }
            }
        } catch (err) {
            alert("Error scanning for saves.");
        }

        btn.textContent = "✨ Auto-Detect Local Saves";
        btn.disabled = false;
    }

    function addServer() {
        const name = document.getElementById('serverName').value.trim();
        const mode = document.querySelector('input[name="mode"]:checked').value;
        
        if (!name) return alert("Please give this server a name.");

        let newServer = { id: 'srv_' + Date.now(), name, mode };

        if (mode === 'local') {
            newServer.localPath = document.getElementById('localPath').value.trim();
            newServer.localSubFolder = document.getElementById('localSubFolder').value.trim();
        } else {
            newServer.ftpHost = document.getElementById('ftpHost').value.trim();
            newServer.ftpPort = document.getElementById('ftpPort').value;
            newServer.ftpUser = document.getElementById('ftpUser').value.trim();
            newServer.ftpPass = document.getElementById('ftpPass').value;
            newServer.ftpBasePath = document.getElementById('ftpBasePath').value.trim() || 'profile';
            if (!newServer.ftpHost || !newServer.ftpUser || !newServer.ftpPass) return alert("Missing FTP details.");
        }

        servers.push(newServer);
        renderServers();
        
        document.getElementById('serverName').value = '';
        document.getElementById('localPath').value = '';
        document.getElementById('localSubFolder').value = '';
        document.getElementById('ftpHost').value = '';
        document.getElementById('ftpPass').value = '';
    }

    function removeServer(index) {
        servers.splice(index, 1);
        renderServers();
    }

    function saveAndLaunch() {
        if (servers.length === 0) return alert("Please add at least one server before launching.");
        const config = { isConfigured: true, servers: servers };
        ipcRenderer.send('save-settings', config);
    }

    ipcRenderer.invoke('get-current-config').then(config => {
        if (config && config.servers) {
            servers = config.servers;
            renderServers();
        }
    });
</script>
</body>
</html>
